openapi: 3.0.3

info:
  title: AutoConnect Vehicle Intelligence API
  description: API specification for connected vehicle intelligence, diagnostics, maintenance prediction, ownership analytics and legacy service fulfillment.
  version: 0.2.0

servers:
  - url: https://api.autoconnect.local

paths:
  /health:
    get:
      summary: Health Check
      responses:
        "200":
          description: Service is running

  /vehicles:
    get:
      summary: Get Vehicles
      responses:
        "200":
          description: Vehicle list returned

  /vehicles/{id}/health:
    get:
      summary: Vehicle Health Score
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vehicle health score returned

  /vehicles/{id}/diagnostics:
    get:
      summary: Vehicle Diagnostics
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Diagnostic information returned

  /vehicles/{id}/maintenance-prediction:
