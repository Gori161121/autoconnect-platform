openapi: 3.0.3

info:
  title: AutoConnect Platform API
  description: API specification for customers, providers, bookings, marketplace analytics and matching.
  version: 1.0.0

servers:
  - url: https://api.autoconnect.local

paths:
  /vehicles/{id}/valuation:
    get:
      summary: Vehicle Valuation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Vehicle valuation returned
  /vehicles/{id}/hybrid-efficiency:
    get:
      summary: Hybrid Vehicle Efficiency
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Hybrid vehicle efficiency returned
  /vehicles/{id}/driver-behavior:
    get:
      summary: Driver Behavior Analytics
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Driver behavior analytics returned
  /vehicles/{id}/ev-battery:
    get:
      summary: EV Battery Intelligence
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: EV battery intelligence returned
  /health:
    get:
      summary: Health Check
      responses:
        '200':
          description: Service is running
            /vehicles:
    get:
      summary: Get Vehicles
      responses:
        '200':
          description: Vehicle list returned

  /vehicles/{id}/health:
    get:
      summary: Vehicle Health Score
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Vehicle health score returned

  /vehicles/{id}/diagnostics:
    get:
      summary: Vehicle Diagnostics
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Diagnostic information returned

  /vehicles/{id}/maintenance-prediction:
    get:
      summary: Maintenance Prediction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Maintenance prediction returned

  /ownership/cost-summary:
    get:
      summary: Ownership Cost Summary
      responses:
        '200':
          description: Ownership cost summary returned

  /customers:
    get:
      summary: Get Customers
      responses:
        '200':
          description: Customer list returned

  /providers:
    get:
      summary: Get Providers
      responses:
        '200':
          description: Provider list returned

  /bookings:
    get:
      summary: Get Bookings
      responses:
        '200':
          description: Booking list returned

  /marketplace/summary:
    get:
      summary: Marketplace Summary
      responses:
        '200':
          description: Marketplace summary returned
