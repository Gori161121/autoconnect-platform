openapi: 3.0.3

info:
  title: AutoConnect Vehicle Intelligence API
  description: >
    Connected vehicle intelligence: diagnostics, vehicle health, maintenance
    prediction, driver analytics, ownership intelligence, AI-explained fault
    codes and service recommendations. A legacy marketplace layer is kept,
    isolated under /legacy.
  version: 0.3.0

servers:
  - url: http://localhost:8000

paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service is running

  /vehicles:
    get:
      summary: List fleet
      responses:
        "200":
          description: List of vehicles

  /vehicles/{id}:
    get:
      summary: Vehicle detail
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        "200": { description: Vehicle returned }
        "404": { description: Vehicle not found }

  /vehicles/{id}/health:
    get:
      summary: Composite vehicle health score
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        "200": { description: Health score returned }

  /vehicles/{id}/diagnostics:
    get:
      summary: Decoded fault codes and diagnostic status
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        "200": { description: Diagnostics returned }

  /vehicles/{id}/maintenance-prediction:
    get:
      summary: Maintenance prediction and urgency
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        "200": { description: Maintenance prediction returned }

  /vehicles/{id}/ev-battery:
    get:
      summary: EV battery summary (EV vehicles only)
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        "200": { description: EV battery summary returned }
        "400": { description: Vehicle is not an EV }

  /vehicles/{id}/hybrid-efficiency:
    get:
      summary: Hybrid efficiency summary (hybrid vehicles only)
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        "200": { description: Hybrid efficiency returned }
        "400": { description: Vehicle is not a hybrid }

  /vehicles/{id}/driver-behavior:
    get:
      summary: Driver behaviour score
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        "200": { description: Driver behaviour returned }

  /vehicles/{id}/insurance-risk:
    get:
      summary: Insurance risk estimate
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        "200": { description: Insurance risk returned }

  /vehicles/{id}/valuation:
    get:
      summary: Estimated vehicle value
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        "200": { description: Valuation returned }

  /vehicles/{id}/intelligence-report:
    get:
      summary: Combined vehicle intelligence report
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        "200": { description: Intelligence report returned }

  /vehicles/{id}/ai-insight:
    get:
      summary: Plain-language AI insight for a vehicle
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        "200": { description: AI insight returned }

  /services/recommendations:
    get:
      summary: Ranked service provider recommendations
      responses:
        "200": { description: Recommendations returned }

  /ownership/cost-summary:
    get:
      summary: Ownership cost breakdown
      responses:
        "200": { description: Cost summary returned }

  /legacy/customers:
    get:
      summary: (Legacy) list customers
      responses:
        "200": { description: Legacy customers returned }

  /legacy/providers:
    get:
      summary: (Legacy) list providers
      responses:
        "200": { description: Legacy providers returned }

  /legacy/bookings:
    get:
      summary: (Legacy) list bookings
      responses:
        "200": { description: Legacy bookings returned }

  /legacy/marketplace/summary:
    get:
      summary: (Legacy) marketplace summary
      responses:
        "200": { description: Legacy marketplace summary returned }
